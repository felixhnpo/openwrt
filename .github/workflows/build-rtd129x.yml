name: Build RTD129x OpenWrt Full Image

on:
  push:
    branches:
      - main
    paths:
      - 'target/linux/rtd129x/**'
      - '.github/workflows/build-rtd129x.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 720

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses-dev libssl-dev python3-setuptools rsync swig unzip zlib1g-dev \
            file patch texinfo bc ccache wget time xz-utils

      - name: Update feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure for RTD129x
        run: |
          echo "CONFIG_TARGET_rtd129x=y" > .config
          echo "CONFIG_TARGET_rtd129x_armv8=y" >> .config
          echo 'CONFIG_TARGET_BOARD="rtd129x"' >> .config
          echo 'CONFIG_SUBTARGET="armv8"' >> .config
          echo "CONFIG_LINUX_6_12=y" >> .config
          echo "CONFIG_TARGET_ROOTFS_EXT4FS=y" >> .config
          echo "CONFIG_TARGET_ROOTFS_SQUASHFS=y" >> .config
          echo "CONFIG_TARGET_IMAGES_GZIP=y" >> .config
          echo "CONFIG_TARGET_KERNEL_PARTSIZE=32" >> .config
          echo "CONFIG_TARGET_ROOTFS_PARTSIZE=256" >> .config
          echo "CONFIG_PACKAGE_base-files=y" >> .config
          echo "CONFIG_PACKAGE_blockdev=y" >> .config
          echo "CONFIG_PACKAGE_blkid=y" >> .config
          echo "CONFIG_PACKAGE_e2fsprogs=y" >> .config
          echo "CONFIG_PACKAGE_f2fs-tools=y" >> .config
          echo "CONFIG_PACKAGE_kmod-gpio-button-hotplug=y" >> .config
          echo "CONFIG_PACKAGE_kmod-leds-gpio=y" >> .config
          echo "CONFIG_PACKAGE_kmod-r8169=y" >> .config
          echo "CONFIG_PACKAGE_kmod-usb-core=y" >> .config
          echo "CONFIG_PACKAGE_kmod-usb2=y" >> .config
          echo "CONFIG_PACKAGE_kmod-usb3=y" >> .config
          echo "CONFIG_PACKAGE_kmod-usb-storage=y" >> .config
          echo "CONFIG_PACKAGE_kmod-scsi-core=y" >> .config
          echo "CONFIG_PACKAGE_kmod-fs-ext4=y" >> .config
          echo "CONFIG_PACKAGE_kmod-fs-vfat=y" >> .config
          echo "CONFIG_PACKAGE_kmod-crypto-core=y" >> .config
          echo "CONFIG_PACKAGE_kmod-nvme=y" >> .config
          echo "CONFIG_PACKAGE_partx-utils=y" >> .config
          echo "CONFIG_PACKAGE_uci=y" >> .config
          echo "CONFIG_PACKAGE_uclient-fetch=y" >> .config
          echo "CONFIG_PACKAGE_opkg=y" >> .config
          echo "CONFIG_PACKAGE_procd=y" >> .config
          echo "CONFIG_PACKAGE_ubus=y" >> .config
          echo "CONFIG_PACKAGE_netifd=y" >> .config
          echo "CONFIG_PACKAGE_dnsmasq=y" >> .config
          echo "CONFIG_PACKAGE_dropbear=y" >> .config
          echo "CONFIG_PACKAGE_mtd=y" >> .config
          echo "CONFIG_PACKAGE_uboot-envtools=y" >> .config
          echo "CONFIG_TARGET_rtd129x_DEVICE_linkease_easepi-ars2=y" >> .config
          echo "CONFIG_DEVEL=y" >> .config
          echo "CONFIG_CCACHE=y" >> .config
          make defconfig

      - name: Download sources
        run: make download -j$(nproc)

      - name: Build tools and toolchain
        run: |
          make tools/install -j$(nproc) || make tools/install V=s
          make toolchain/install -j$(nproc) || make toolchain/install V=s

      - name: Build world
        run: make world -j$(nproc) || make world V=s

      - name: List build output
        run: |
          echo "=== Images ==="
          ls -la bin/targets/rtd129x/armv8/ 2>/dev/null || true
          echo "=== Checksums ==="
          cat bin/targets/rtd129x/armv8/sha256sums 2>/dev/null || true

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-rtd129x-firmware
          path: |
            bin/targets/rtd129x/armv8/*.bin*
            bin/targets/rtd129x/armv8/*.img*
            bin/targets/rtd129x/armv8/*.tar*
            bin/targets/rtd129x/armv8/sha256sums
          retention-days: 14

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-rtd129x-build-logs
          path: logs/
          retention-days: 7
