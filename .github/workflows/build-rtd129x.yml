name: Build RTD129x OpenWrt Full Image

on:
  push:
    branches:
      - main
    paths:
      - 'target/linux/rtd129x/**'
      - '.github/workflows/build-rtd129x.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 720

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses-dev libssl-dev python3-setuptools rsync swig unzip zlib1g-dev \
            file patch texinfo bc ccache wget time xz-utils

      - name: Update feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure for RTD129x
        run: |
          cat > .config << 'CONFIG'
CONFIG_TARGET_rtd129x=y
CONFIG_TARGET_rtd129x_armv8=y
CONFIG_TARGET_BOARD="rtd129x"
CONFIG_SUBTARGET="armv8"
CONFIG_TARGET_ARCH_PACKAGES="aarch64_cortex-a53"
CONFIG_DEFAULT_TARGET_OPTIMIZATION="-Os -pipe -mcpu=cortex-a53"
CONFIG_LINUX_6_12=y
CONFIG_TARGET_ROOTFS_EXT4FS=y
CONFIG_TARGET_ROOTFS_SQUASHFS=y
CONFIG_TARGET_ROOTFS_TARGZ=y
CONFIG_TARGET_ROOTFS_CPIOGZ=y
CONFIG_TARGET_IMAGES_GZIP=y
CONFIG_TARGET_KERNEL_PARTSIZE=32
CONFIG_TARGET_ROOTFS_PARTSIZE=256
CONFIG_PACKAGE_base-files=y
CONFIG_PACKAGE_blockdev=y
CONFIG_PACKAGE_blkid=y
CONFIG_PACKAGE_e2fsprogs=y
CONFIG_PACKAGE_f2fs-tools=y
CONFIG_PACKAGE_f2fsck=y
CONFIG_PACKAGE_mkf2fs=y
CONFIG_PACKAGE_kmod-gpio-button-hotplug=y
CONFIG_PACKAGE_kmod-leds-gpio=y
CONFIG_PACKAGE_kmod-r8169=y
CONFIG_PACKAGE_kmod-usb-core=y
CONFIG_PACKAGE_kmod-usb-ehci=y
CONFIG_PACKAGE_kmod-usb2=y
CONFIG_PACKAGE_kmod-usb3=y
CONFIG_PACKAGE_kmod-usb-storage=y
CONFIG_PACKAGE_kmod-usb-storage-uas=y
CONFIG_PACKAGE_kmod-nls-base=y
CONFIG_PACKAGE_kmod-nls-cp437=y
CONFIG_PACKAGE_kmod-nls-iso8859-1=y
CONFIG_PACKAGE_kmod-nls-utf8=y
CONFIG_PACKAGE_kmod-scsi-core=y
CONFIG_PACKAGE_kmod-fs-ext4=y
CONFIG_PACKAGE_kmod-fs-vfat=y
CONFIG_PACKAGE_kmod-fs-nfs-common=y
CONFIG_PACKAGE_kmod-fs-nfs-v4=y
CONFIG_PACKAGE_kmod-crypto-core=y
CONFIG_PACKAGE_kmod-crypto-hash=y
CONFIG_PACKAGE_kmod-crypto-manager=y
CONFIG_PACKAGE_kmod-crypto-iv=y
CONFIG_PACKAGE_kmod-crypto-echainiv=y
CONFIG_PACKAGE_kmod-crypto-sha256=y
CONFIG_PACKAGE_kmod-crypto-aead=y
CONFIG_PACKAGE_kmod-crypto-ctr=y
CONFIG_PACKAGE_kmod-crypto-seqiv=y
CONFIG_PACKAGE_kmod-dm=y
CONFIG_PACKAGE_kmod-md-mod=y
CONFIG_PACKAGE_kmod-nvme=y
CONFIG_PACKAGE_kmod-tun=y
CONFIG_PACKAGE_libc=y
CONFIG_PACKAGE_libgcc=y
CONFIG_PACKAGE_libpthread=y
CONFIG_PACKAGE_librt=y
CONFIG_PACKAGE_partx-utils=y
CONFIG_PACKAGE_uci=y
CONFIG_PACKAGE_uclient-fetch=y
CONFIG_PACKAGE_opkg=y
CONFIG_PACKAGE_procd=y
CONFIG_PACKAGE_ubus=y
CONFIG_PACKAGE_ubox=y
CONFIG_PACKAGE_netifd=y
CONFIG_PACKAGE_odhcp6c=y
CONFIG_PACKAGE_odhcpd-ipv6only=y
CONFIG_PACKAGE_firewall4=y
CONFIG_PACKAGE_ip6tables=y
CONFIG_PACKAGE_iptables=y
CONFIG_PACKAGE_dnsmasq=y
CONFIG_PACKAGE_dropbear=y
CONFIG_PACKAGE_logd=y
CONFIG_PACKAGE_mtd=y
CONFIG_PACKAGE_uboot-envtools=y
CONFIG_TARGET_rtd129x_DEVICE_linkease_easepi-ars2=y
CONFIG_DEVEL=y
CONFIG_CCACHE=y
CONFIG_CCACHE_DIR=""
CONFIG_EXTERNAL_KERNEL_TREE=""
CONFIG_KERNEL_GIT_CLONE_URI=""
CONFIG_KERNEL_GIT_LOCAL_REPOSITORY=""
CONFIG_KERNEL_GIT_REF=""
CONFIG_KERNEL_GIT_MIRROR_HASH=""
CONFIG_PACKAGE_ath10k-board-qca4019=y
CONFIG_PACKAGE_ath10k-firmware-qca4019=y
CONFIG_PACKAGE_ath10k-firmware-qca9888=y
CONFIG_PACKAGE_ath10k-firmware-qca988x=y
CONFIG_PACKAGE_ath10k-firmware-qca9984=y
CONFIG_PACKAGE_kmod-ath10k=y
CONFIG_PACKAGE_kmod-ath=y
CONFIG_PACKAGE_kmod-mac80211=y
CONFIG_PACKAGE_wpad-basic-mbedtls=y
CONFIG_PACKAGE_kmod-rtw88=y
CONFIG_PACKAGE_kmod-rtw88-8822ce=y
CONFIG_PACKAGE_rtw88-firmware=y
CONFIG
          make defconfig

      - name: Download sources
        run: make download -j$(nproc)

      - name: Build tools and toolchain
        run: |
          make tools/install -j$(nproc) || make tools/install V=s
          make toolchain/install -j$(nproc) || make toolchain/install V=s

      - name: Build world (full image)
        run: make world -j$(nproc) || make world V=s

      - name: List build output
        run: |
          echo "=== Kernel ==="
          ls -la bin/targets/rtd129x/armv8/*.img* 2>/dev/null || true
          ls -la bin/targets/rtd129x/armv8/*.tar* 2>/dev/null || true
          echo "=== Packages ==="
          ls bin/targets/rtd129x/armv8/packages/ 2>/dev/null | head -20 || true
          echo "=== Image Info ==="
          cat bin/targets/rtd129x/armv8/openwrt-* 2>/dev/null || true
          df -h

      - name: Upload firmware images
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-rtd129x-firmware
          path: |
            bin/targets/rtd129x/armv8/*.img*
            bin/targets/rtd129x/armv8/*.tar*
            bin/targets/rtd129x/armv8/sha256sums
            bin/targets/rtd129x/armv8/config.buildinfo
            bin/targets/rtd129x/armv8/version.buildinfo
          retention-days: 14

      - name: Upload kernel and build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-rtd129x-kernel-logs
          path: |
            build_dir/target-aarch64*/linux-rtd129x*/vmlinux*
            build_dir/target-aarch64*/linux-rtd129x*/System.map
            logs/
          retention-days: 7
