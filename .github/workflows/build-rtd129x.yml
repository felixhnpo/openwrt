name: Build RTD129x OpenWrt

on:
  push:
    branches:
      - main
    paths:
      - 'target/linux/rtd129x/**'
      - '.github/workflows/build-rtd129x.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 600

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses-dev libssl-dev python3-setuptools rsync swig unzip zlib1g-dev \
            file patch texinfo bc ccache wget time

      - name: Update feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure for RTD129x
        run: |
          echo "CONFIG_TARGET_rtd129x=y" > .config
          echo "CONFIG_TARGET_rtd129x_armv8=y" >> .config
          echo 'CONFIG_TARGET_BOARD="rtd129x"' >> .config
          echo 'CONFIG_SUBTARGET="armv8"' >> .config
          echo "CONFIG_PACKAGE_blkid=y" >> .config
          echo "CONFIG_PACKAGE_blockdev=y" >> .config
          echo "CONFIG_PACKAGE_e2fsprogs=y" >> .config
          echo "CONFIG_PACKAGE_uboot-envtools=y" >> .config
          echo "CONFIG_PACKAGE_kmod-gpio-button-hotplug=y" >> .config
          echo "CONFIG_PACKAGE_kmod-r8169=y" >> .config
          echo "CONFIG_PACKAGE_partx-utils=y" >> .config
          echo "CONFIG_TARGET_rtd129x_DEVICE_linkease_easepi-ars2=y" >> .config
          make defconfig

      - name: Build tools
        run: make tools/install -j$(nproc) || make tools/install V=s

      - name: Build toolchain
        run: make toolchain/install -j$(nproc) || make toolchain/install V=s

      - name: Build target
        run: make target/linux/compile -j$(nproc) || make target/linux/compile V=s

      - name: Show build logs on failure
        if: failure()
        run: |
          find logs/ -name "*.log" -exec tail -100 {} \; || true

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-rtd129x-build
          path: |
            bin/targets/rtd129x/
            build_dir/target-aarch64*/linux-rtd129x*/
          retention-days: 7
